<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | Trueborn</title>
<link rel="stylesheet" href="style.css">
<style>
/* Simple styling for cart */
.cart-item {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 10px;
}
.cart-item img {
    width: 80px;
    height: 80px;
    object-fit: contain;
    margin-right: 20px;
}
.cart-item-details {
    flex-grow: 1;
}
.cart-item-details h4 {
    margin: 0 0 5px 0;
}
.cart-item-details p {
    margin: 2px 0;
    font-size: 14px;
    color: #555;
}
.remove-btn {
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 4px;
}
.summary-total {
    display: flex;
    justify-content: space-between;
    font-size: 18px;
    font-weight: bold;
    margin-top: 20px;
}
.complete-order {
    background: #0077cc;
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}
.complete-order:hover {
    background: #005fa3;
}
</style>
</head>
<body>

<header class="header">
    <div class="logo">TRUEBORN</div>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<div class="cart-container" style="max-width:900px; margin:50px auto; padding:20px;">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>

    <div class="summary-total">
        <span>Total:</span>
        <span id="cart-total">$0.00</span>
    </div>

    <div style="display:flex; justify-content:center; margin-top:30px;">
        <button class="complete-order" onclick="goToCheckout()">Proceed To Checkout</button>
    </div>
</div>

<script>
// Load cart from localStorage
let cart = JSON.parse(localStorage.getItem('cart')) || [];

const cartItemsContainer = document.getElementById('cart-items');
const cartTotal = document.getElementById('cart-total');

function renderCart() {
    cartItemsContainer.innerHTML = '';
    let total = 0;

    if(cart.length === 0){
        cartItemsContainer.innerHTML = '<p>Your cart is empty.</p>';
        cartTotal.innerText = '$0.00';
        return;
    }

    cart.forEach((item, index) => {
        total += item.price;

        const div = document.createElement('div');
        div.className = 'cart-item';

        div.innerHTML = `
            <img src="${item.img}" alt="${item.name}">
            <div class="cart-item-details">
                <h4>${item.name}</h4>
                <p>Size: ${item.size} | Color: ${item.color}</p>
                <p>Price: $${item.price}</p>
            </div>
            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
        `;
        cartItemsContainer.appendChild(div);
    });

    cartTotal.innerText = '$' + total.toFixed(2);
}

// Remove item
function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
}

// Place order: redirect to checkout page
function goToCheckout(){
    if(cart.length === 0){
        alert('Your cart is empty.');
        return;
    }
    // Redirect to your checkout page
    window.location.href = "checkout.html";
}

// Initial render
renderCart();
</script>

</body>
</html>
